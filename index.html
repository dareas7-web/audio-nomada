<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=devices-width, initial scale=1.0">
	<title>Diego Areas | Developer</title>
	<style>
	    * {
	       margin: 0; 
	       padding: 0;
               box-sizing: border-box;
	    }

            body {
                background: #0a0a0a;
                color: #e4e4e7;
                font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                line-height: 1.6;
                overflow-x: hidden;
 	    }
            .container {
                max-width: 900px;
                margin: 0 auto;
                padding: 0 24px;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
            
            .hero {
                margin-bottom: 80px;
            }
            
            .badge {
                display: inline-block;
                background: #18181b;
                border: 1px solid #27272a;
                padding: 6px 16px;
                border-radius: 20px;
                font-size: 14px;
                color: #a1a1aa;
                margin-botton: 24px;
           }
           
           h1 { 
               font-size: clamp(48px, 8vw, 80px);
               font-weight: 800;
               background: linear-gradient(135deg, #00ff88 0%, #00d9ff 100%);
               -webkit-background-clip: text;
               -webkit-text-fill-color: transparent;
               background-clip: text;
               margin-bottom: 16px;
               letter-spacing: -2px;
             }
            
           .subtitle {
              font-size: clamp(18px, 3vw, 24px);
              color: #a1a1aa;
              margin-botton: 40px;
              max-width: 600px;
            }
           
           .stack { 
             display: flex;
             gap: 12px;
             flex-wrap: wrap;
             margin-bottom: 48px;
           }
	  
          .tag  {
             backgroun: #18181b;
             border: 1px solid #27272a;
             padding: 8px 16px;
             border-radius: 8px;
             font-size: 14px;
             font-family: monospace;
             transition: all 0.2s;
           }
   
          .tag:hover {
             border-color: 00ff88;
             transform: translateY(-2px);
           }
 
         .links {
             display: flex;
             gap: 16px;
             flex-wrap: wrap;
           }

          .btn { 
             padding: 14px 28px;
             border-radius: 8px;
             text-decoration: none;
             font-weight: 600;
             transition: all 0.2s;
             display: inline-block;
           }

          .btn-primary {
             background: #00ff88;
             color: #0a0a0a;
          }
          
         .btn-primary:hover {
             background: #00e67a;
             transform: translateY(-2px);
             box-shadow: 0 8px 20px rgba(0, 255, 136, 0.3);
          }

         .btn-secondary:hover {
            background: transparent;
            color: #e4e4e7;
            border: 1px solid #27272a;
         }

        .btn-secondary:hover {
           border-color: #00ff88;
           background: #18181b;
        }

       footer {
           position: absolute;
           bottom: 32px;
           color: #52525b
           font-size: 14px;
         }

       .glow {
           position: fixed;
           width: 500px;
           height: 500px;
           border-radius: 50%;
           backgroud: radial-gradient(circle,rgba(0, 255, 136, 0.1) 0%, transparent 70%);
           top: -200px;
           pointer-events: none;
        }
       </style>               
     </head>        
   </body>
        <div class="glow"></div>
        <div class="container">
        <div class="hero">
        <span class="badge"> En construccion</span>
        <h1>diego areas</h1>
        <p class="subtitle">
            fullstack dev construyendo proyectos desde cero.
            especializado en codigo limpio y experiencia minimalista.
        </p>
   
         <div class="stack">
            <span class="tag">HTML</span>
            <span class="tag">CSS</span>
            <span class="tag">Git</span>
            <span class="tag">Github</span>
            <span class="tag">Linux</span>
         </div>
    
         <div class="links">
          <a href="https://github.com/dareas7-web" class="btn btn-primary">ver Github</a>
          <a href="mailto: dareas7@gmail.com" class="btn btn-secondary">contacto</a>
      
        </div>
       </div>
      <footer>
        2026 diego Areas.

      </footer>
     </div>
</body>
</html>
